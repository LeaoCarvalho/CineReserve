services:
  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD}
      --notify-keyspace-events Ex
    volumes:
      - redis_data:/data

  db:
    image: postgres:14
    container_name: cinereserve_db
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: django_app
    command: daphne -b 0.0.0.0 -p 8000 config.asgi:application
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
      - redis
    restart: always

  redis-listener:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: redis_listener
    command: python manage.py listen_redis_expiration
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - redis
      - web
    restart: always

volumes:
  redis_data:
  postgres_data: